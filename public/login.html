<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-ingresar { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-logout { width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #mensaje { margin-top: 15px; font-size: 14px; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h3>Iniciar Sesión</h3>
        <input type="text" id="correo" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button class="btn-ingresar" onclick="login()">Ingresar</button>
        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        <div id="mensaje"></div>
    </div>

<script>
 // Pon aquí tu URL real de Render sin la diagonal al final
 const API_URL = '';

async function login() {
    const correo = document.getElementById('correo').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('mensaje');

    try {
        const res = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ correo, password })
        });

        const data = await res.json();

        if (data.success) {
            localStorage.setItem('token', data.token); 
            window.location.href = '/autorecarga.html';
        } else {
            msg.innerText = data.message || "Error al iniciar sesión.";
            msg.style.display = 'block';
        }
    } catch (error) {
        console.error("❌ Error de red:", error);
        msg.innerText = "Error crítico de conexión.";
        msg.style.display = 'block';
    }
}

function logout() {
    localStorage.removeItem('token');
    window.location.href = '/login.html';
}

// Lógica de protección: Si ya está logueado, enviar al sistema
const token = localStorage.getItem('token');
if (token && window.location.pathname === '/login.html') {
    window.location.href = '/autorecarga.html';
}
</script>
</body>
</html>
