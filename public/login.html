<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema</title>
</head>
<body>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-ingresar { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-logout { width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #mensaje { margin-top: 15px; font-size: 14px; padding: 10px; border-radius: 5px; display: none; }
    </style>

    <div class="login-card">
        <h3>Iniciar Sesión</h3>
        <input type="text" id="correo" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button class="btn-ingresar" onclick="login()">Ingresar</button>
        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        <div id="mensaje"></div>
    </div>

<script>
// La URL base detecta automáticamente el dominio actual (Render o localhost)
const API_URL = window.location.origin;

async function login() {
    const correo = document.getElementById('correo').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('mensaje');

    console.log("🚀 Iniciando petición a:", `${API_URL}/auth/login`);

    try {
        const res = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ correo, password })
        });

        // Intentamos parsear, pero verificamos si la respuesta es JSON primero
        const data = await res.json().catch(() => ({}));

        if (res.ok && data.success) {
            localStorage.setItem('token', data.token); 
            console.log("✅ Autenticación exitosa.");
            window.location.href = '/autorecarga.html';
        } else {
            // Manejo de errores específicos (401, 500, etc.)
            const errorMsg = data.message || (res.status === 500 ? "Error interno del servidor" : "Credenciales incorrectas");
            msg.innerText = "Error: " + errorMsg;
            msg.style.display = 'block';
            console.warn("⚠️ Fallo:", errorMsg);
        }
    } catch (error) {
        console.error("❌ Error de red:", error);
        msg.innerText = "Error crítico de conexión. Verifica la consola.";
        msg.style.display = 'block';
    }
}

// Función de logout simplificada
function logout() {
    localStorage.removeItem('token');
    window.location.href = '/login.html';
}

// Lógica de protección de ruta: Redirección inmediata si ya hay sesión
document.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('token');
    if (token && window.location.pathname.endsWith('login.html')) {
        console.log("ℹ️ Sesión activa detectada, redirigiendo...");
        window.location.href = '/autorecarga.html';
    }
});
</script>
</body>
</html>
